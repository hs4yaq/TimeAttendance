    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, deleteField, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 🟢 เริ่มระบบ: 0. PWA SETUP & INSTALL BANNER
        // ==========================================
        const manifest = {
            "name": "PTC TimeAttendance",
            "short_name": "PTC Check-in",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#f1f5f9",
            "theme_color": "#9D1515",
            "icons": [{"src": "https://www.ptc.ac.th/attendance/logo_ptc.png", "sizes": "192x192", "type": "image/png"}]
        };
        document.getElementById('pwa-manifest').href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Reg Failed', err));
        }

        window.hideInstallBanner = () => {
            const banner = document.getElementById('pwa-install-banner');
            banner.classList.add('translate-y-[calc(100%+1rem)]');
            setTimeout(() => banner.classList.add('hidden'), 300);
        };

        const isIOS = (/iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) && !window.MSStream;
        const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;

        // --- ตรวจสอบว่าเป็น iOS แต่ไม่ได้เปิดด้วย Safari (เช่น Chrome, LINE) ---
        const uaLowerCase = window.navigator.userAgent.toLowerCase();
        const isSafariForPwa = /safari/.test(uaLowerCase) && !/crios/.test(uaLowerCase) && !/fxios/.test(uaLowerCase) && !/line/.test(uaLowerCase);
        const isIosNotSafari = isIOS && !isSafariForPwa;
        // ----------------------------------------------------------------------

        let deferredPrompt;
        window.isSystemReady = false; 

        window.showPwaBanner = () => {
            if (isStandalone) return; 
            const banner = document.getElementById('pwa-install-banner');
            const btn = document.getElementById('btn-install-pwa');
            const textDiv = banner.querySelector('div > div:nth-child(2)');

            if (isIOS) {
                textDiv.innerHTML = `
                    <div class="space-y-4">
                        <div class="flex items-center gap-3">
                            <i data-lucide="hand" class="text-blue-400 shrink-0"></i>
                            <div>
                                <p class="font-black text-sm text-blue-400">วิธีติดตั้งบน iOS ( Safari )</p>
                                <p class="text-[11px] text-slate-300 mt-0.5 leading-tight">ทำตาม 2 ขั้นตอนง่ายๆ เพื่อเพิ่มแอปลงหน้าจอหลักครับ</p>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3 text-center text-xs">
                            <div class="bg-slate-800 p-3 rounded-2xl flex flex-col items-center">
                                <div class="w-7 h-7 bg-blue-500 rounded-full flex items-center justify-center font-black mb-3 text-white">1</div>
                                <p class="text-white font-bold leading-tight mb-3 flex-1 min-h-[36px] flex items-center">แตะปุ่ม "แชร์"<br>(Share)</p>
                                <div class="bg-slate-700/60 p-1 rounded-lg border border-slate-600/50 mt-1 shrink-0 w-full h-12 flex items-center justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-share"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                                </div>
                            </div>
                            
                            <div class="bg-slate-800 p-3 rounded-2xl flex flex-col items-center">
                                <div class="w-7 h-7 bg-ptc-red rounded-full flex items-center justify-center font-black mb-3 text-white">2</div>
                                <p class="text-white font-bold leading-tight mb-3 flex-1 min-h-[36px] flex items-center">เลือก "เพิ่มไปยัง<br>หน้าจอโฮม"</p>
                                <div class="bg-slate-700/60 p-1 rounded-lg border border-slate-600/50 mt-1 shrink-0 w-full h-12 flex items-center justify-center">
                                    <div class="flex items-center gap-2.5 px-3">
                                        <div class="w-8 h-8 bg-slate-900 border-2 border-slate-600 border-dashed rounded-lg flex items-center justify-center">
                                            <i data-lucide="plus" class="text-slate-400" size="18"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                btn.style.display = 'none';
                
                banner.classList.remove('hidden');
                setTimeout(() => { banner.classList.remove('translate-y-[calc(100%+1rem)]'); banner.classList.add('translate-y-0'); }, 100);
                if (typeof lucide !== 'undefined') lucide.createIcons();
            } else if (deferredPrompt) {
                banner.classList.remove('hidden');
                setTimeout(() => { banner.classList.remove('translate-y-[calc(100%+1rem)]'); banner.classList.add('translate-y-0'); }, 100);
            }
        };

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (window.isSystemReady && !isStandalone && !isIOS) {
                window.showPwaBanner();
            }
        });

        document.getElementById('btn-install-pwa').addEventListener('click', async () => {
            window.hideInstallBanner();
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
            }
        });
        // === 🔴 สิ้นสุดระบบ: 0. PWA SETUP ===

        // ==========================================
        // 🟢 เริ่มระบบ: 1. CONFIGURATION & GLOBAL STATE
        // ==========================================
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "=======================แก้ไขตรงนี้=======================",
            authDomain: "=======================แก้ไขตรงนี้=======================",
            projectId: "=======================แก้ไขตรงนี้======================="
        };
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : "=======================แก้ไขตรงนี้=======================";
        const SYSTEM_VERSION = "24.03-1150 ©hs4yaq";
        let db, auth;

        window.state = {
            view: '', 
            profile: null,
            adminEmails: ['suppachai.hom@ptc.ac.th', 'saraban@ptc.ac.th'], 
            schoolLoc: { lat: 7.8920, lng: 98.3980, radius: 200 },
            timeLimits: { inStart: '06:30', inEnd: '09:30', outStart: '16:30', outEnd: '22:00' }, 
            executives: ["---"], divisions: ["---"], academicDepts: ["---"], jobs: [],
            jobTitles: ["ครูผู้สอน", "เจ้าหน้าที่", "พนักงานราชการ", "ลูกจ้างชั่วคราว"],
            leaveTypes: ["ลากิจ", "ลาป่วย", "ไปราชการ", "ขาดราชการ", "อื่นๆ"],
            allowedChannels: { line: false, facebook: false, chrome: true, safari: true }, // ระบบเปิด-ปิดช่องทาง
            deviceId: getDeviceID(),
            clientIp: '...',
            adminRecords: [],
            allUsers: [], 
            isProcessing: false,
            filters: { start: new Date().toLocaleDateString('en-CA') }
        };
        // === 🔴 สิ้นสุดระบบ: 1. CONFIGURATION ===

        // ==========================================
        // 🟢 เริ่มระบบ: 2. UTILITIES (ฟังก์ชันช่วยเหลือต่างๆ)
        // ==========================================
        
        const escapeHTML = (str) => {
            if (str === null || str === undefined) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({'&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'}[tag] || tag));
        };

        function getDeviceID() {
            let did = localStorage.getItem('ptc_device_id');
            if (!did) {
                const match = document.cookie.match(new RegExp('(^| )ptc_device_id=([^;]+)'));
                if (match) did = match[2];
            }
            if (!did) {
                const uuid = (typeof crypto !== 'undefined' && crypto.randomUUID) 
                    ? crypto.randomUUID() 
                    : 'xxxx-xxxx-xxxx-xxxx'.replace(/[x]/g, () => (Math.random() * 16 | 0).toString(16));
                did = 'DID-' + uuid.substring(0, 18);
            }
            localStorage.setItem('ptc_device_id', did);
            const d = new Date();
            d.setTime(d.getTime() + (10 * 365 * 24 * 60 * 60 * 1000));
            document.cookie = `ptc_device_id=${did};expires=${d.toUTCString()};path=/;SameSite=Lax;Secure`;
            return did;
        }

        async function getTrueTime() {
            try {
                const res = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=Asia/Bangkok');
                if (!res.ok) throw new Error();
                const data = await res.json();
                return new Date(data.year, data.month - 1, data.day, data.hour, data.minute, data.seconds);
            } catch (e) {
                console.warn("TimeAPI failed, using fallback device time", e);
                return new Date(); 
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        window.showNotify = (type, title, text) => {
            const modal = document.getElementById('status-modal');
            const iconBg = document.getElementById('modal-icon-bg');
            document.getElementById('modal-title').innerText = title; 
            document.getElementById('modal-text').innerHTML = text; 
            iconBg.className = `w-20 h-20 rounded-full flex items-center justify-center text-white mb-6 ${type === 'success' ? 'bg-emerald-500 shadow-xl' : 'bg-red-600 shadow-xl'}`;
            iconBg.innerHTML = type === 'success' ? '<i data-lucide="check" size="40"></i>' : '<i data-lucide="x" size="40"></i>';
            modal.classList.add('modal-active');
            lucide.createIcons();
        };

        window.closeStatusModal = () => document.getElementById('status-modal').classList.remove('modal-active');
        // === 🔴 สิ้นสุดระบบ: 2. UTILITIES ===

        // ==========================================
        // 🟢 เริ่มระบบ: 3. DATA & SERVICES (ดึงข้อมูล Firebase)
        // ==========================================
        async function loadConfig() {
            try {
                const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'settings', 'config'));
                if (snap.exists()) {
                    const d = snap.data();
                    if (d.location) window.state.schoolLoc = d.location;
                    if (d.timeLimits) window.state.timeLimits = d.timeLimits;
                    if (d.divisions) window.state.divisions = d.divisions;
                    if (d.academicDepts) window.state.academicDepts = d.academicDepts;
                    if (d.jobs) window.state.jobs = d.jobs;
                    if (d.executives) window.state.executives = d.executives;
                    if (d.adminEmails) window.state.adminEmails = d.adminEmails; 
                    if (d.jobTitles) window.state.jobTitles = d.jobTitles;
                    if (d.leaveTypes) window.state.leaveTypes = d.leaveTypes;

            const fn = escapeHTML(document.getElementById('reg-fn').value.trim());

                    boundDeviceId: window.state.deviceId, mainLine: mainL, 
                    createdAt: serverTimestamp()

        window.submitAttendance = async (win) => {
            if (!isStandalone && isIosNotSafari) {
                window.showNotify(
                    'warning', 
                    'คำแนะนำสำหรับ iPhone/iPad', 
                    'เพื่อป้องกันปัญหาพิกัด GPS ผิดพลาด <b>กรุณาคัดลอกลิงก์นี้ไปเปิดในแอป Safari</b> ก่อนกดใช้งานหรือเพิ่มลงหน้าจอโฮมครับ'
                );
            }
            
            const s = window.state;
            s.isProcessing = true; 
            
            const attBtn = document.getElementById('main-att-btn');
            if (attBtn) {
                attBtn.innerHTML = `<i data-lucide="loader-2" class="animate-spin" size="28"></i> กำลังตรวจสอบพิกัด...`;
                attBtn.classList.add('pointer-events-none', 'opacity-80');
                lucide.createIcons();
            }
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    let realLoc = s.schoolLoc; 
                    const dist = Math.round(calculateDistance(pos.coords.latitude, pos.coords.longitude, realLoc.lat, realLoc.lng));
                    
                    if (dist > realLoc.radius) { 
                        window.showNotify('error', 'อยู่นอกพิกัด', `คุณห่างจากจุดที่กำหนด ${dist} ม. (จำกัด ${realLoc.radius} ม.)`); 
                        if (attBtn) {
                            attBtn.innerHTML = `<i data-lucide="map-pin" size="28"></i> บันทึกเวลา${win==='IN'?'เข้างาน':'เลิกงาน'}`;
                            attBtn.classList.remove('pointer-events-none', 'opacity-80');
                            lucide.createIcons();
                        }
                    } else {
                        const finalTime = await getTrueTime();
                        const todayStr = finalTime.toLocaleDateString('en-CA');
                        
                        const docId = `${todayStr}_${s.profile.posId}_${win}`;
                        const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'attendance', docId);
                        const checkSnap = await getDoc(docRef);
                        
                        if (checkSnap.exists()) {
                            window.showNotify('error', 'ลงเวลาซ้ำ', `ระบบตรวจพบว่าคุณได้บันทึกเวลา${win==='IN'?'เข้างาน':'เลิกงาน'} ของวันนี้ไปแล้ว`);
                            localStorage.setItem(`ptc_att_${s.profile.posId}_${todayStr}_${win}`, finalTime.toLocaleTimeString('th-TH', { hour12: false }));
                            if (attBtn) {
                                attBtn.innerHTML = `<i data-lucide="map-pin" size="28"></i> บันทึกเวลา${win==='IN'?'เข้างาน':'เลิกงาน'}`;
                                attBtn.classList.remove('pointer-events-none', 'opacity-80');
                                lucide.createIcons();
                            }
                        } else {
                            await setDoc(docRef, { 
                                posId: s.profile.posId, userName: `${s.profile.firstName} ${s.profile.lastName}`, 
                                division: s.profile.division, department: s.profile.department, 
                                mainLine: s.profile.mainLine, jobName: s.profile.jobName, 
                                type: win, 
                                timestamp: serverTimestamp(), 
                                date: todayStr, timeDisplay: finalTime.toLocaleTimeString('th-TH', { hour12: false }), 
                                ipAddress: s.clientIp, deviceId: s.deviceId, distance: dist 
                            });

                            localStorage.setItem(`ptc_att_${s.profile.posId}_${todayStr}_${win}`, finalTime.toLocaleTimeString('th-TH', { hour12: false }));
                            const actionName = win === 'IN' ? 'CLOCK_IN' : 'CLOCK_OUT';
                            const actionDetail = win === 'IN' ? 'เข้างาน' : 'เลิกงาน';
                            await window.saveSystemLog(actionName, `ลงเวลา${actionDetail} สำเร็จ เวลา ${finalTime.toLocaleTimeString('th-TH', { hour12: false })} น. (ห่างจากจุดศูนย์กลาง ${dist} เมตร)`);
                            window.showNotify('success', 'สำเร็จ', `บันทึกเวลา${win==='IN'?'เข้างาน':'เลิกงาน'}เรียบร้อย`);
                            
                            // Targeted update
                            const localTodayStr = new Date().toLocaleDateString('en-CA');
                            const displayInBox = document.getElementById('display-in-box');
                            const displayOutBox = document.getElementById('display-out-box');
                            
                            const storedIn = localStorage.getItem(`ptc_att_${s.profile.posId}_${localTodayStr}_IN`);
                            const storedOut = localStorage.getItem(`ptc_att_${s.profile.posId}_${localTodayStr}_OUT`);
                            
                            if (displayInBox) displayInBox.innerHTML = (storedIn && storedIn !== 'true') ? `<span class="text-emerald-600 font-black text-xl">${escapeHTML(storedIn)}</span> <span class="text-xs text-slate-400 font-bold">น.</span>` : (storedIn === 'true' ? `<span class="text-emerald-600 font-black text-sm">ลงเวลาแล้ว</span>` : `<span class="text-red-500 font-bold text-sm">ยังไม่ลงเวลา</span>`);
                            if (displayOutBox) displayOutBox.innerHTML = (storedOut && storedOut !== 'true') ? `<span class="text-orange-500 font-black text-xl">${escapeHTML(storedOut)}</span> <span class="text-xs text-slate-400 font-bold">น.</span>` : (storedOut === 'true' ? `<span class="text-orange-500 font-black text-sm">ลงเวลาแล้ว</span>` : `<span class="text-red-500 font-bold text-sm">ยังไม่ลงเวลา</span>`);
                            
                            const btnWrap = document.getElementById('btn-wrap');
                            if (win === 'IN') {
                                if (btnWrap) btnWrap.innerHTML = '<div class="p-6 bg-emerald-50 text-emerald-700 rounded-3xl font-black flex flex-col items-center gap-2 border border-emerald-100 shadow-sm"><i data-lucide="check-circle-2" size="32"></i> ลงเวลาเข้างานแล้ว</div>';
                            } else {
                                if (btnWrap) btnWrap.innerHTML = '<div class="p-6 bg-orange-50 text-orange-700 rounded-3xl font-black flex flex-col items-center gap-2 border border-orange-100 shadow-sm"><i data-lucide="check-circle-2" size="32"></i> ลงเวลาเลิกงานแล้ว</div>';
                            }
                            lucide.createIcons();
                        }
                    }
                } catch(e) { 
                    window.showNotify('error', 'เกิดข้อผิดพลาด', e.message); 
                    if (attBtn) {
                        attBtn.innerHTML = `<i data-lucide="map-pin" size="28"></i> บันทึกเวลา${win==='IN'?'เข้างาน':'เลิกงาน'}`;
                        attBtn.classList.remove('pointer-events-none', 'opacity-80');
                        lucide.createIcons();
                    }
                } 
                finally { s.isProcessing = false; }
            }, (err) => { 
                let errorMsg = 'กรุณาเปิด GPS และอนุญาตให้เข้าถึงตำแหน่ง (Location)';
                
                if (isIOS && isStandalone) {
                    errorMsg = 'iOS บล็อกการเข้าถึง GPS! <br><br><span class="text-[10px] font-normal">วิธีแก้: ไปที่ <b>การตั้งค่า (Settings) > ความเป็นส่วนตัว > บริการหาตำแหน่งที่ตั้ง > เว็บไซต์ Safari</b> แล้วตั้งเป็น "ในระหว่างใช้แอป" <br>หรือ <b>ลบแอปออกจากหน้าจอแล้วแอดใหม่</b> ครับ</span>';
                }
                window.showNotify('error', 'พิกัด GPS ล้มเหลว', errorMsg); 
                s.isProcessing = false; 
                if (attBtn) {
                    attBtn.innerHTML = `<i data-lucide="map-pin" size="28"></i> บันทึกเวลา${win==='IN'?'เข้างาน':'เลิกงาน'}`;
                    attBtn.classList.remove('pointer-events-none', 'opacity-80');
                    lucide.createIcons();
                }
            }, { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 });
        };

        window.saveSettings = async () => {
            try {
                const lt = parseFloat(document.getElementById('cfg-lat').value);
                const lg = parseFloat(document.getElementById('cfg-lng').value);
                const rd = parseInt(document.getElementById('cfg-rad').value);
                if (isNaN(lt) || isNaN(lg) || isNaN(rd)) {
                    window.showNotify('error', 'ข้อมูลไม่ครบ', 'กรุณาระบุพิกัด Lat, Lng และรัศมีเป็นตัวเลขให้ถูกต้อง');
                    return;
                }
                
                const newTimeLimits = {
                    inStart: document.getElementById('cfg-in-s').value, inEnd: document.getElementById('cfg-in-e').value,
                    outStart: document.getElementById('cfg-out-s').value, outEnd: document.getElementById('cfg-out-e').value
                };

                const adminEmails = document.getElementById('cfg-admins').value.split('\n').map(e => e.trim()).filter(e => e);
                const jobTitles = document.getElementById('cfg-jobtitles').value.split('\n').map(e => e.trim()).filter(e => e);
                const leaveTypes = document.getElementById('cfg-leaves').value.split('\n').map(e => e.trim()).filter(e => e);              
                const executives = document.getElementById('cfg-execs').value.split('\n').map(e => e.trim()).filter(e => e);
                const divisions = document.getElementById('cfg-divs').value.split('\n').map(e => e.trim()).filter(e => e);
                const academicDepts = document.getElementById('cfg-adepts').value.split('\n').map(e => e.trim()).filter(e => e);
                const jobsRaw = document.getElementById('cfg-jobs').value.split('\n').map(e => e.trim()).filter(e => e);
                const jobs = jobsRaw.map(j => {
                    const parts = j.split(':');
                    return { 
                        name: parts[0] ? parts[0].trim() : '', 
                        parent: parts.length > 1 ? parts[1].trim() : 'ไม่มีสังกัด'
                    };
                }).filter(j => j.name !== '');

                // อ่านค่าช่องทางจากปุ่ม UI
                const newChannels = {
                    line: document.getElementById('cfg-chan-line').dataset.val === 'true',
                    facebook: document.getElementById('cfg-chan-fb').dataset.val === 'true',
                    chrome: document.getElementById('cfg-chan-chrome').dataset.val === 'true',
                    safari: document.getElementById('cfg-chan-safari').dataset.val === 'true'
                };

                await setDoc(doc(db,'artifacts',APP_ID,'public','data','settings','config'), { 
                    location: {lat:lt, lng:lg, radius:rd}, 
                    timeLimits: newTimeLimits, 
                    adminEmails: adminEmails, 
                    jobTitles: jobTitles,
                    leaveTypes: leaveTypes,
                    executives: executives,
                    divisions: divisions,
                    academicDepts: academicDepts,
                    jobs: jobs,
                    allowedChannels: newChannels // บันทึกช่องทางที่อนุญาต
                }, {merge:true});
                await window.saveSystemLog('UPDATE_SETTINGS', 'อัปเดตโครงสร้างและเวลาปฏิบัติงานของวิทยาลัย');
                
                window.state.schoolLoc = {lat:lt, lng:lg, radius:rd}; 
                window.state.timeLimits = newTimeLimits; 
                window.state.adminEmails = adminEmails; 
                window.state.jobTitles = jobTitles;
                window.state.leaveTypes = leaveTypes;
                window.state.executives = executives;
                window.state.divisions = divisions;
                window.state.academicDepts = academicDepts;
                window.state.jobs = jobs;
                window.state.allowedChannels = newChannels;

        window.saveRemark = async (posId, val) => {
            const s = window.state;
            const dateStr = s.filters.start;
            const docId = `${dateStr}_${posId}_REMARK`;
            const user = s.allUsers.find(u => String(u.posId) === String(posId));
            
            try {
                if (!val) {
                    await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'attendance', docId), {
                        posId: posId, date: dateStr, type: 'REMARK', remark: ''
                    }, {merge: true});
                } else {
                    await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'attendance', docId), {
                        posId: posId,
                        userName: user ? `${user.firstName} ${user.lastName}` : 'Unknown',
                        division: user ? user.division : '', department: user ? user.department : '',
                        mainLine: user ? user.mainLine : '', jobName: user ? user.jobName : '',
                        date: dateStr, type: 'REMARK', remark: val,
                        timestamp: serverTimestamp()
                    });
                }
                
                const existingIndex = s.adminRecords.findIndex(r => r.posId === posId && r.type === 'REMARK');
                if (val) {
                    const newRec = { posId, date: dateStr, type: 'REMARK', remark: val };
                    if (existingIndex > -1) s.adminRecords[existingIndex] = newRec; else s.adminRecords.push(newRec);
                } else {
                    if (existingIndex > -1) s.adminRecords.splice(existingIndex, 1);
                }
                
                const printTd = document.getElementById('print-remark-' + posId);
                if (printTd) printTd.innerText = val || '-';

                const logMsg = val ? `เพิ่มหมายเหตุ [ ${val} ] ให้กับรหัส: ${posId}` : `ลบหมายเหตุของรหัส: ${posId}`;
                await window.saveSystemLog('UPDATE_REMARK', logMsg);
                
            } catch (error) {

                    <div class="print-section-title">คณะผู้บริหาร</div>
                    <table class="report-table">
                        <thead><tr><th style="width: 30%;">ตำแหน่งบริหาร</th><th style="width: 20%;">ชื่อ-นามสกุล</th><th style="width: 15%;">เวลาเข้า</th><th style="width: 15%;">เวลาออก</th><th style="width: 20%;">หมายเหตุ / IP</th></tr></thead>
                        <tbody>${s.executives.map(ex => { 
                            const user = s.allUsers.find(u => u.mainLine === 'EXECUTIVE' && u.jobName === ex);
                            const ri = records.find(r => r.mainLine === 'EXECUTIVE' && r.jobName === ex && r.type === 'IN'); 
                            const ro = records.find(r => r.mainLine === 'EXECUTIVE' && r.jobName === ex && r.type === 'OUT'); 
                            const rem = records.find(r => r.mainLine === 'EXECUTIVE' && r.jobName === ex && r.type === 'REMARK');
                            const uName = user ? `${user.firstName} ${user.lastName}` : (ri ? ri.userName : (ro ? ro.userName : '-'));
                            const remarkCol = ri ? ri.ipAddress : (ro ? ro.ipAddress : (rem && rem.remark ? rem.remark : '-'));
                            return `<tr><td>${escapeHTML(ex)}</td><td>${escapeHTML(uName)}</td><td>${ri ? ri.timeDisplay : '-'}</td><td>${ro ? ro.timeDisplay : '-'}</td><td id="print-remark-${user ? user.posId : 'EX-'+ex}">${escapeHTML(remarkCol)}</td></tr>`;

                    ${divSummary.map(div => `

                            const jobUsers = s.allUsers.filter(u => u.division === div.name && (u.department === job.name || u.jobName === job.name)).sort((a, b) => {
                                    const riA = job.entries.find(e => e.posId === a.posId && e.type === 'IN');

                                return (riA ? riA.timeDisplay : '99:99:99').localeCompare(riB ? riB.timeDisplay : '99:99:99');

                        return `<div style="padding-left:10px; margin-top:5px; font-weight:bold;">แผนก: ${escapeHTML(dept.name)}</div>
                        <table class="report-table">
                            <thead><tr><th style="width: 30%;">ชื่อ-นามสกุล</th><th style="width: 20%;">รหัสประจำตัว</th><th style="width: 15%;">เวลาเข้า</th><th style="width: 15%;">เวลาออก</th><th style="width: 20%;">หมายเหตุ / IP</th></tr></thead>
                            <tbody>${deptUsers.length > 0 ? deptUsers.map(user => {
                                const pid = user.posId; 
                                const ri = dept.entries.find(e => e.posId === pid && e.type === 'IN'); 
                                const ro = dept.entries.find(e => e.posId === pid && e.type === 'OUT');
                                const rem = dept.entries.find(e => e.posId === pid && e.type === 'REMARK');
                                const remarkCol = ri ? ri.ipAddress : (ro ? ro.ipAddress : (rem && rem.remark ? rem.remark : '-'));

                        </table>`;

            document.getElementById('dp').onchange = async (e) => { s.filters.start = e.target.value; document.getElementById('view-admin_panel').innerHTML = `<div class="flex flex-col items-center justify-center min-h-[75vh] w-full animate-in fade-in"><div class="loader w-12 h-12 border-4 rounded-full mb-6 border-slate-100 border-t-red-600 shadow-sm"></div><p class="text-slate-400 font-bold uppercase tracking-widest text-lg animate-pulse">กำลังดึงข้อมูลรายงาน...</p></div>`; await loadAdminData(); render(); };
            
            document.getElementById('form-edit-user').onsubmit = async (e) => {
                e.preventDefault();
                const oldPosId = document.getElementById('edit-original-id').value;
                const isNew = oldPosId === 'NEW';
                const targetId = isNew ? document.getElementById('edit-posid').value.trim() : oldPosId;

                const btn = document.getElementById('btn-save-edit');
                btn.innerText = "กำลังบันทึก..."; btn.disabled = true;

                if (!targetId) { window.showNotify('error', 'ไม่สมบูรณ์', 'กรุณาระบุรหัส ID'); btn.innerHTML = `<i data-lucide="save" size="18"></i> บันทึกข้อมูล`; btn.disabled = false; return; }

                const newData = { firstName: document.getElementById('edit-fn').value.trim(), lastName: document.getElementById('edit-ln').value.trim(), mainLine: document.getElementById('edit-mainline').value, division: document.getElementById('edit-div').value.trim(), department: document.getElementById('edit-dept').value.trim(), jobName: document.getElementById('edit-job').value.trim() };

                try {
                    if (isNew) {
                        const checkSnap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', targetId));
                        if(checkSnap.exists()) {
                             window.showNotify('error', 'รหัสซ้ำ', 'มีรหัส ID นี้ในระบบแล้ว');
                             btn.innerHTML = `<i data-lucide="save" size="18"></i> บันทึกข้อมูล`; btn.disabled = false; return;
                        }
                        const fullData = { posId: targetId, ...newData, createdAt: serverTimestamp() };
                        await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', targetId), fullData);
                        s.allUsers.push({id: targetId, ...fullData});
                        window.showNotify('success', 'สำเร็จ', 'สร้างบุคลากรใหม่เรียบร้อยแล้ว<br>ให้บุคลากรนำรหัสไปล็อคอินที่เครื่องตนเองได้เลยเพื่อผูกเครื่อง');
                        await window.saveSystemLog('CREATE_USER', 'เพิ่มบุคลากรใหม่ รหัส: ' + targetId + ' (' + newData.firstName + ' ' + newData.lastName + ')');
                    } else {
                        await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', targetId), newData);
                        const userIndex = s.allUsers.findIndex(u => String(u.posId) === String(targetId));
                        if(userIndex > -1) { s.allUsers[userIndex] = { ...s.allUsers[userIndex], ...newData }; }
                        window.showNotify('success', 'สำเร็จ', 'อัปเดตข้อมูลบุคลากรเรียบร้อยแล้ว');
                        await window.saveSystemLog('EDIT_USER', 'แก้ไขข้อมูลบุคลากร รหัส: ' + targetId + ' (' + newData.firstName + ' ' + newData.lastName + ')');
                    }
                    document.getElementById('edit-user-modal').classList.remove('modal-active'); window.searchUsers(); 
                } catch (error) { window.showNotify('error', 'ข้อผิดพลาด', 'ไม่สามารถบันทึกข้อมูลได้'); } 
                finally { btn.innerHTML = `<i data-lucide="save" size="18"></i> บันทึกข้อมูล`; btn.disabled = false; lucide.createIcons(); }
            };
            setTimeout(() => lucide.createIcons(), 50);
        }

        window.searchUsers = () => {
            const term = document.getElementById('user-search').value.toLowerCase();
            const filtered = window.state.allUsers.filter(u => 
                (u.firstName || '').toLowerCase().includes(term) || 
                (u.lastName || '').toLowerCase().includes(term) || 
                String(u.posId || '').toLowerCase().includes(term) || 
                (u.jobName || '').toLowerCase().includes(term)
            );
            document.getElementById('user-table-body').innerHTML = window.renderUserTable(filtered);
            lucide.createIcons();
        };

        const setupUserFormDropdowns = (mlEl, divEl, deptEl, jobEl) => {
            const s = window.state;
            const populateOptions = (selectEl, options, selectedValue) => {
                const uniqueOpts = [...new Set(options)];
                let html = uniqueOpts.map(o => `<option value="${escapeHTML(String(o))}">${escapeHTML(String(o))}</option>`).join('');
                if (selectedValue && !uniqueOpts.includes(selectedValue)) {
                    html += `<option value="${escapeHTML(String(selectedValue))}">${escapeHTML(String(selectedValue))}</option>`;
                }
                selectEl.innerHTML = html;
                if (selectedValue) selectEl.value = selectedValue;
                else if (uniqueOpts.length > 0) selectEl.value = uniqueOpts[0];
            };

            const updateDivisions = (mlVal, targetDiv) => {
                let divOpts = [];
                if (mlVal === 'EXECUTIVE') divOpts = ['คณะผู้บริหาร'];
                else if (mlVal === 'ACADEMIC') divOpts = ['วิชาการ'];
                else divOpts = s.divisions || [];
                populateOptions(divEl, divOpts, targetDiv);
            };

            const updateDepartments = (mlVal, divVal, targetDept) => {
                let deptOpts = [];
                if (mlVal === 'EXECUTIVE') deptOpts = ['บริหาร'];
                else if (mlVal === 'ACADEMIC') deptOpts = s.academicDepts || [];
                else deptOpts = (s.jobs || []).filter(j => j.parent === divVal).map(j => j.name);
                populateOptions(deptEl, deptOpts, targetDept);
            };

            const updateJobs = (mlVal, deptVal, targetJob) => {
                let jobOpts = [];
                if (mlVal === 'EXECUTIVE') {
                    jobOpts = s.executives || [];
                } else if (mlVal === 'ACADEMIC') {
                    jobOpts = (s.jobTitles || []).filter(t => t.startsWith('ครู:')).map(t => t.substring(t.indexOf(':')+1).trim());
                    if (jobOpts.length === 0) jobOpts = ['ครู', 'ครูชำนาญการ'];
                } else {
                    jobOpts = (s.jobTitles || [])
                        .filter(t => t.startsWith('เจ้าหน้าที่:'))
                        .map(t => t.substring(t.indexOf(':')+1).trim().replace(/{dept}/g, deptVal || ''));
                    if (jobOpts.length === 0) jobOpts = ['เจ้าหน้าที่งาน' + (deptVal || '')];
                }
                populateOptions(jobEl, jobOpts, targetJob);
            };

            mlEl.onchange = () => { updateDivisions(mlEl.value, null); updateDepartments(mlEl.value, divEl.value, null); updateJobs(mlEl.value, deptEl.value, null); };
            divEl.onchange = () => { updateDepartments(mlEl.value, divEl.value, null); updateJobs(mlEl.value, deptEl.value, null); };
            deptEl.onchange = () => { updateJobs(mlEl.value, deptEl.value, null); };

            return { updateDivisions, updateDepartments, updateJobs };
        };

        window.openAddUser = () => {
            document.getElementById('modal-action-title').innerHTML = '<i data-lucide="user-plus" class="text-ptc-red inline-block" size="20"></i> เพิ่มบุคลากรใหม่';
            document.getElementById('id-warning-msg').style.display = 'none';
            
            document.getElementById('edit-original-id').value = 'NEW';
            const idInput = document.getElementById('edit-posid');
            idInput.value = '';
            idInput.readOnly = false;
            idInput.classList.remove('bg-slate-100', 'text-slate-500');
            idInput.classList.add('bg-slate-50', 'focus:border-red-600');
            
            document.getElementById('edit-fn').value = '';
            document.getElementById('edit-ln').value = '';
            
            const mlEl = document.getElementById('edit-mainline');
            const divEl = document.getElementById('edit-div');
            const deptEl = document.getElementById('edit-dept');
            const jobEl = document.getElementById('edit-job');
            
            const actions = setupUserFormDropdowns(mlEl, divEl, deptEl, jobEl);
            mlEl.value = 'EXECUTIVE';
            actions.updateDivisions(mlEl.value, null);
            actions.updateDepartments(mlEl.value, divEl.value, null);
            actions.updateJobs(mlEl.value, deptEl.value, null);
            
            document.getElementById('edit-user-modal').classList.add('modal-active');
            lucide.createIcons();
        };

        window.openEditUser = (posId) => {
            const user = window.state.allUsers.find(u => String(u.posId) === String(posId));
            if(user) {
                document.getElementById('modal-action-title').innerHTML = '<i data-lucide="user-cog" class="text-ptc-red inline-block" size="20"></i> จัดการข้อมูลบุคลากร';
                document.getElementById('id-warning-msg').style.display = 'flex';
                
                const idInput = document.getElementById('edit-posid');
                idInput.readOnly = true;
                idInput.classList.add('bg-slate-100', 'text-slate-500');
                idInput.classList.remove('bg-slate-50', 'focus:border-red-600');

                const mlEl = document.getElementById('edit-mainline');
                const divEl = document.getElementById('edit-div');
                const deptEl = document.getElementById('edit-dept');
                const jobEl = document.getElementById('edit-job');
                
                const actions = setupUserFormDropdowns(mlEl, divEl, deptEl, jobEl);
                
                mlEl.value = user.mainLine || 'SUPPORT';
                actions.updateDivisions(mlEl.value, user.division);
                actions.updateDepartments(mlEl.value, divEl.value, user.department);
                actions.updateJobs(mlEl.value, deptEl.value, user.jobName);

                document.getElementById('edit-original-id').value = user.posId; 
                document.getElementById('edit-posid').value = user.posId || ''; 
                document.getElementById('edit-fn').value = user.firstName || ''; 
                document.getElementById('edit-ln').value = user.lastName || ''; 
                
                document.getElementById('edit-user-modal').classList.add('modal-active');
                lucide.createIcons();
            }
        };

        window.showAdminTab = (n) => {
            document.getElementById('p1').style.display = (n===1) ? 'block' : 'none'; document.getElementById('p2').style.display = (n===2) ? 'block' : 'none';
            document.getElementById('t1').className = (n===1) ? 'bg-white p-3 rounded-xl shadow-sm transition-all font-bold text-slate-800' : 'p-3 rounded-xl text-slate-500 font-bold';
            document.getElementById('t2').className = (n===2) ? 'bg-white p-3 rounded-xl shadow-sm transition-all font-bold text-slate-800' : 'p-3 rounded-xl text-slate-500 font-bold';
        };

        window.doReset = async (id) => {
            const user = window.state.allUsers.find(u => String(u.posId) === String(id));
            if (!user || !user.boundDeviceId) { window.showNotify('error', 'แจ้งเตือน', 'รหัสนี้ยังไม่ได้ผูกกับอุปกรณ์ใดๆ'); return; }
            if(confirm('ล้างเครื่องเก่าของรหัส ' + id + ' หรือไม่?')) {
                try {
                    await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', id), { boundDeviceId: deleteField() });
                    user.boundDeviceId = null; window.searchUsers(); window.showNotify('success', 'สำเร็จ', 'พนักงานสามารถผูกเครื่องใหม่ได้ทันที');
                    await window.saveSystemLog('RESET_DEVICE', 'ปลดล็อคอุปกรณ์ของรหัส ID: ' + id);
                } catch(e) { window.showNotify('error', 'ข้อผิดพลาด', 'ไม่สามารถรีเซ็ตได้'); }
            }
        };

        window.exportToWord = () => {
            const printArea = document.getElementById('print-area'); if (!printArea) return;
            const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Attendance Report</title><style>body { font-family: 'TH SarabunPSK', 'Sarabun', 'Cordia New', sans-serif; } .report-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14pt; table-layout: fixed; } .report-table th, .report-table td { border: 1px solid #000; padding: 5px; text-align: left; word-wrap: break-word; } .print-section-title { background-color: #f3f4f6; font-weight: bold; padding: 5px; border: 1px solid #000; margin-top: 10px; font-size: 16pt; } svg { display: none; } </style></head><body>";
            const html = header + printArea.innerHTML + "</body></html>";
            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const downloadLink = document.createElement("a"); downloadLink.href = url; downloadLink.download = 'Attendance_Report_' + window.state.filters.start + '.doc';
            document.body.appendChild(downloadLink); downloadLink.click(); document.body.removeChild(downloadLink); URL.revokeObjectURL(url);
        };
        // === 🔴 สิ้นสุดระบบ: 5. VIEWS & RENDERING ===

        // ==========================================
        // 🟢 เริ่มระบบ: 6. INITIALIZATION & ROUTER (หัวใจหลักสั่งรันระบบตอนโหลดเว็บ)
        // ==========================================
        async function init() {
            try {
                fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => { window.state.clientIp = d.ip; }).catch(e => console.log('IP fetch failed'));
                
                document.getElementById('app-version').innerText = "VERSION " + SYSTEM_VERSION;
                
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                const finishLoading = () => {
                    document.getElementById('init-loader').style.display = 'none';
                    window.isSystemReady = true; 
                    
                    setTimeout(() => {
                        window.showPwaBanner();
                        
                        // --- แจ้งเตือนคนใช้ iOS (Chrome/LINE) ทันทีที่โหลดเข้าเว็บเสร็จ ---
                        if (!isStandalone && isIosNotSafari) {
                            setTimeout(() => {
                                window.showNotify(
                                    'warning', 
                                    'คำแนะนำสำหรับผู้ใช้ iOS', 
                                    'เพื่อให้ระบบบันทึกเวลาและ GPS ทำงานได้ถูกต้อง 100%<br><b>กรุณาคัดลอกลิงก์ไปเปิดในแอป Safari</b> ก่อนกดเพิ่มลงหน้าจอโฮมครับ'
                                );
                            }, 500); 
                        }
                        // -------------------------------------------------------------
                        
                    }, 1500); 
                };

                onAuthStateChanged(auth, async (u) => {
                    if (!u) {
                        await signInAnonymously(auth);
                        return; 
                    }

                    await loadConfig();
                    
                    // ==========================================
                    //  🟢 ดักจับการเปิดผ่านแอปพลิเคชัน (ระบบควบคุมช่องทาง)
                    // ==========================================
                    const ua = navigator.userAgent || navigator.vendor || window.opera;
                    const isLine = (ua.indexOf("Line") > -1);
                    const isFb = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1);
                    const isChrome = !isLine && !isFb && (ua.indexOf("Chrome") > -1 || ua.indexOf("CriOS") > -1);
                    const isSafari = !isLine && !isFb && (ua.indexOf("Safari") > -1 && ua.indexOf("Chrome") === -1 && ua.indexOf("CriOS") === -1);

                    const ac = window.state.allowedChannels;
                    let isBlocked = false;

                    if (isLine && !ac.line) isBlocked = true;
                    else if (isFb && !ac.facebook) isBlocked = true;
                    else if (isChrome && !ac.chrome) isBlocked = true;
                    else if (isSafari && !ac.safari) isBlocked = true;

                    if (isBlocked) {
                        document.body.innerHTML = `
                            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background:#f1f5f9; text-align:center; padding:20px; font-family:'Sarabun',sans-serif;">
                                <div style="background:white; padding:30px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.1); max-width:400px; width:100%;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#eab308" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto 15px auto;"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
                                    <h2 style="color:#1e293b; font-size:20px; font-weight:900; margin-bottom:10px;">ช่องทางนี้ถูกปิดการใช้งาน</h2>
                                    <p style="color:#64748b; font-size:14px; margin-bottom:20px; line-height:1.5;">แอดมินระบบได้ตั้งค่าไม่อนุญาตให้เข้าใช้งานผ่านแอป/เบราว์เซอร์นี้<br><br>กรุณาคัดลอกลิงก์ไปเปิดใน <b>ช่องทางอื่นที่ได้รับอนุญาต</b> ครับ</p>
                                </div>
                            </div>
                        `;
                        return; // หยุดการทำงานของระบบที่เหลือทั้งหมด
                    }
                    // ==========================================
                    
                    const CURRENT_CACHE_VERSION = SYSTEM_VERSION; 
                    if (localStorage.getItem('ptc_cache_version') !== CURRENT_CACHE_VERSION) {
                        const checkUserId = localStorage.getItem('ptc_logged_in_user');
                        if (checkUserId) {
                            const d = new Date();
                            const yyyy = d.getFullYear();
                            const mm = String(d.getMonth() + 1).padStart(2, '0');
                            const dd = String(d.getDate()).padStart(2, '0');
                            const safeTodayStr = `${yyyy}-${mm}-${dd}`;
                            localStorage.removeItem(`ptc_att_${checkUserId}_${safeTodayStr}_IN`);
                            localStorage.removeItem(`ptc_att_${checkUserId}_${safeTodayStr}_OUT`);
                            const oldFormat = d.toLocaleDateString('en-CA');
                            localStorage.removeItem(`ptc_att_${checkUserId}_${oldFormat}_IN`);
                            localStorage.removeItem(`ptc_att_${checkUserId}_${oldFormat}_OUT`);
                        }
                        localStorage.setItem('ptc_cache_version', CURRENT_CACHE_VERSION);
                    }

                    const savedUserId = localStorage.getItem('ptc_logged_in_user');
                    const lastView = sessionStorage.getItem('ptc_current_view'); 
                    let userProfileLoaded = false;

                    if (savedUserId) {
                        try {
                            const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', savedUserId));
                            if (snap.exists() && snap.data().boundDeviceId === window.state.deviceId) {
                                
                                const finalTime = await getTrueTime();
                                const todayStr = finalTime.toLocaleDateString('en-CA');
                                
                                if (!localStorage.getItem(`ptc_att_${savedUserId}_${todayStr}_IN`)) {
                                    const inSnap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'attendance', `${todayStr}_${savedUserId}_IN`));
                                    if(inSnap.exists()) localStorage.setItem(`ptc_att_${savedUserId}_${todayStr}_IN`, inSnap.data().timeDisplay);
                                }
                                if (!localStorage.getItem(`ptc_att_${savedUserId}_${todayStr}_OUT`)) {
                                    const outSnap = await getDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'attendance', `${todayStr}_${savedUserId}_OUT`));
                                    if(outSnap.exists()) localStorage.setItem(`ptc_att_${savedUserId}_${todayStr}_OUT`, outSnap.data().timeDisplay);
                                }

                                window.state.profile = snap.data();
                                userProfileLoaded = true;
                            } else { localStorage.removeItem('ptc_logged_in_user'); }
                        } catch (e) { console.error("Auto login failed", e); }
                    }

                    if (u && !u.isAnonymous) {
                        if (u.email && window.state.adminEmails.includes(u.email)) {
                            finishLoading(); 
                            if (lastView === 'admin_panel') {
                                window.navigate('admin_panel');
                            } else if (lastView === 'dashboard' && userProfileLoaded) {
                                window.navigate('dashboard');
                            } else if (userProfileLoaded) {
                                window.navigate('dashboard');
                            } else {
                                window.navigate('admin_panel');
                            }
                            
                        } else {
                            finishLoading(); 
                            window.showNotify('error', 'ไม่มีสิทธิ์เข้าถึง', `อีเมล <b>${u.email}</b> ไม่ใช่ผู้ดูแลระบบ`);
                            await signOut(auth); 
                            await signInAnonymously(auth); 
                            if (userProfileLoaded) window.navigate('dashboard');
                            else window.navigate('login'); 
                        }
                    } else if (userProfileLoaded) {
                        finishLoading(); window.navigate('dashboard'); 
                    } else { 
                        finishLoading(); window.navigate('login'); 
                    }
                });

            } catch (err) { 
                console.error("Firebase Init Error", err); 
                document.getElementById('loader-msg').innerText = "ข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล";
            }
        }

        init();
        // === 🔴 สิ้นสุดระบบ: 6. INITIALIZATION & ROUTER ===
    </script>
    </body>
</html>
